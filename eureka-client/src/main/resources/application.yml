spring:
  application:
    name: eureka-client
  mvc:
    servlet:
      load-on-startup: 1
      multipart:
        max-file-size: 10MB
        max-request-size: 20MB

    static-path-pattern: /excel/**

  resources:
    static-locations: file:D://excel/
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/appraise?useUnicode=true&allowMultiQueries=true&characterEncoding=UTF-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 7499
    tomcat:
      max-idle: 10
      max-wait: 10000
      min-idle: 5
      initial-size: 5
    filter: stat,wall
  aop:
    auto: true
    proxy-target-class: true

server:
  port: 9001
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8
    session:
      timeout: 30m

  tomcat:
    uri-encoding: UTF-8

debug: true

mybatis:
  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zpepdi.eureka_client.entity

logging:
  config: classpath:logback-spring.xml

eureka:
  instance:
    hostname: localhost
  client:
    # 注册到Eureka的注册中心
    register-with-eureka: true
    # 获取注册实例列表
    fetch-registry: true
    service-url:
      # 配置注册中心地址
      defaultZone: http://localhost:9000/eureka/